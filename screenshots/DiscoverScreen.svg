<!-- log_table -->
<g id="node5" class="node">
<title>log_table</title>
<polygon fill="#ffe0b2" stroke="black" points="301.14,-332.4 154.86,-332.4 154.86,-238 301.14,-238 301.14,-332.4"/>
<text xml:space="preserve" text-anchor="middle" x="228" y="-320.3" font-family="Arial" font-size="9.00">Таблица логов</text>
<text xml:space="preserve" text-anchor="middle" x="228" y="-309.5" font-family="Arial" font-size="9.00">Каждая строка = одно событие</text>
<text xml:space="preserve" text-anchor="middle" x="228" y="-298.7" font-family="Arial" font-size="9.00">Колонки:</text>
<text xml:space="preserve" text-anchor="middle" x="228" y="-287.9" font-family="Arial" font-size="9.00">  @timestamp — время</text>
<text xml:space="preserve" text-anchor="middle" x="228" y="-277.1" font-family="Arial" font-size="9.00">  message — текст лога</text>
<text xml:space="preserve" text-anchor="middle" x="228" y="-266.3" font-family="Arial" font-size="9.00">  host.name — сервер</text>
<text xml:space="preserve" text-anchor="middle" x="228" y="-255.5" font-family="Arial" font-size="9.00">  tags — метки (nginx, psql)</text>
<text xml:space="preserve" text-anchor="middle" x="228" y="-244.7" font-family="Arial" font-size="9.00">  log.file.path — файл</text>
</g>
