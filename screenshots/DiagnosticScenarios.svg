<svg width="741pt" height="238pt" viewBox="0.00 0.00 741.00 238.00" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(4 233.6)">
<title>DiagnosticScenarios</title>
<polygon fill="white" stroke="none" points="-4,4 -4,-233.6 736.92,-233.6 736.92,4 -4,4"/>
<text xml:space="preserve" text-anchor="middle" x="366.46" y="-209.4" font-family="Arial" font-size="18.00">Типовые сценарии диагностики в Kibana</text>
<!-- scenario1 -->
<g id="node1" class="node">
<title>scenario1</title>
<polygon fill="#ffcdd2" stroke="black" points="129.92,-194 0,-194 0,-6 129.92,-6 129.92,-194"/>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-181" font-family="Arial" font-size="10.00">Сценарий 1: Ошибки 502</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-169" font-family="Arial" font-size="10.00">Симптом: пользователи</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-157" font-family="Arial" font-size="10.00">жалуются на 502</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-133" font-family="Arial" font-size="10.00">Действие:</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-121" font-family="Arial" font-size="10.00">1. KQL: nginx AND 502</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-109" font-family="Arial" font-size="10.00">2. Смотрим гистограмму</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-97" font-family="Arial" font-size="10.00">   → когда началось?</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-85" font-family="Arial" font-size="10.00">3. Смотрим host.name</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-73" font-family="Arial" font-size="10.00">   → на каком сервере?</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-61" font-family="Arial" font-size="10.00">4. Смотрим message</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-49" font-family="Arial" font-size="10.00">   → почему 502?</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-25" font-family="Arial" font-size="10.00">Результат: backend-1</text>
<text xml:space="preserve" text-anchor="middle" x="64.96" y="-13" font-family="Arial" font-size="10.00">упал в 15:32</text>
</g>
<!-- scenario2 -->
<g id="node2" class="node">
<title>scenario2</title>
<polygon fill="#ffcdd2" stroke="black" points="349.77,-188 188.14,-188 188.14,-12 349.77,-12 349.77,-188"/>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-175" font-family="Arial" font-size="10.00">Сценарий 2: Медленная БД</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-163" font-family="Arial" font-size="10.00">Симптом: сайт тормозит</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-139" font-family="Arial" font-size="10.00">Действие:</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-127" font-family="Arial" font-size="10.00">1. KQL: postgresql AND duration</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-115" font-family="Arial" font-size="10.00">2. Фильтр: duration &gt; 1000</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-103" font-family="Arial" font-size="10.00">3. Смотрим @timestamp</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-91" font-family="Arial" font-size="10.00">   → пик в 12:00?</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-79" font-family="Arial" font-size="10.00">4. Смотрим message</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-67" font-family="Arial" font-size="10.00">   → какой запрос?</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-43" font-family="Arial" font-size="10.00">Результат: SELECT без</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-31" font-family="Arial" font-size="10.00">индекса в обеденный</text>
<text xml:space="preserve" text-anchor="middle" x="268.96" y="-19" font-family="Arial" font-size="10.00">час пик</text>
</g>
<!-- scenario3 -->
<g id="node3" class="node">
<title>scenario3</title>
<polygon fill="#ffcdd2" stroke="black" points="544.53,-200 407.39,-200 407.39,0 544.53,0 544.53,-200"/>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-187" font-family="Arial" font-size="10.00">Сценарий 3: Анализ DDoS</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-175" font-family="Arial" font-size="10.00">Симптом: резкий рост</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-163" font-family="Arial" font-size="10.00">трафика</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-139" font-family="Arial" font-size="10.00">Действие:</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-127" font-family="Arial" font-size="10.00">1. Смотрим гистограмму</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-115" font-family="Arial" font-size="10.00">   → всплеск в 03:00</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-103" font-family="Arial" font-size="10.00">2. KQL: nginx AND access</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-91" font-family="Arial" font-size="10.00">3. Смотрим message</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-79" font-family="Arial" font-size="10.00">   → 10000 запросов/сек</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-67" font-family="Arial" font-size="10.00">   с одного IP</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-55" font-family="Arial" font-size="10.00">4. Добавляем фильтр</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-43" font-family="Arial" font-size="10.00">   по IP</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-19" font-family="Arial" font-size="10.00">Результат: DDoS атака</text>
<text xml:space="preserve" text-anchor="middle" x="475.96" y="-7" font-family="Arial" font-size="10.00">с IP 45.33.32.156</text>
</g>
<!-- scenario4 -->
<g id="node4" class="node">
<title>scenario4</title>
<polygon fill="#c8e6c9" stroke="black" points="732.92,-200 603,-200 603,0 732.92,0 732.92,-200"/>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-187" font-family="Arial" font-size="10.00">Сценарий 4: Мониторинг</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-175" font-family="Arial" font-size="10.00">после деплоя</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-163" font-family="Arial" font-size="10.00">Симптом: новый релиз</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-139" font-family="Arial" font-size="10.00">Действие:</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-127" font-family="Arial" font-size="10.00">1. KQL: tags: "nginx"</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-115" font-family="Arial" font-size="10.00">2. Фильтр по времени:</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-103" font-family="Arial" font-size="10.00">   после деплоя</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-91" font-family="Arial" font-size="10.00">3. Смотрим ошибки:</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-79" font-family="Arial" font-size="10.00">   nginx AND error</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-67" font-family="Arial" font-size="10.00">4. Сравниваем с</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-55" font-family="Arial" font-size="10.00">   предыдущим часом</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-31" font-family="Arial" font-size="10.00">Результат: ошибок</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-19" font-family="Arial" font-size="10.00">не увеличилось</text>
<text xml:space="preserve" text-anchor="middle" x="667.96" y="-7" font-family="Arial" font-size="10.00">→ деплой успешен</text>
</g>
</g>
</svg>