<text xml:space="preserve" text-anchor="middle" x="180.04" y="-799.17" font-family="Arial" font-size="10.00">Kibana 8.12.0</text>
<text xml:space="preserve" text-anchor="middle" x="180.04" y="-787.17" font-family="Arial" font-size="10.00">Filebeat 8.12.0</text>
<text xml:space="preserve" text-anchor="middle" x="180.04" y="-775.17" font-family="Arial" font-size="10.00">Установка через dpkg -i</text>
