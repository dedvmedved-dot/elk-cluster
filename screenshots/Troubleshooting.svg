<text xml:space="preserve" text-anchor="middle" x="180.04" y="-395.17" font-family="Arial" font-size="10.00">Получили новые IP</text>
<text xml:space="preserve" text-anchor="middle" x="180.04" y="-383.17" font-family="Arial" font-size="10.00">через virsh domifaddr</text>
